services:
  gin:
    build: .
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: twitter_db
    ports:
      - '8080:8080'
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: twitter_db
    ports:
      - '5432:5432'
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d twitter_db']
      interval: 5s
      timeout: 5s
      retries: 5
