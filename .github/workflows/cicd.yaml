name: Web API Deploy Pipeline
# mainブランチにpushされたらデプロイが走る
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'images/**'
      - '.gitignore'
      - '.dockerignore'

env:
  AWS_REGION: ap-northeast-1
  ECS_CLUSTER: x-clone-cluster
  ECS_SERVICE: x-clone-task-service-vxxmsybf
  ECR_REPOSITORY: x-clone-image
  ECS_TASK_DEFINITION: .aws/task-definition.json

# このワークフローはOIDCでAWS認証するため権限を明示する。
# permissionsを明示すると、書いていない権限はすべてnoneになる点に注意。
permissions:
  id-token: write # GitHubにJWTを発行させる許可。これが無いとOIDC認証が始められない
  contents: read # actions/checkoutがコードをcloneするために必要

jobs:
  # Build
  build:
    runs-on: ubuntu-24.04-arm # Fargateの実行環境がARM64のため、イメージもARM64ランナーでビルドする
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker image build -t tmp_image:latest .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push the image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker image tag tmp_image:latest $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker image push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          echo $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} > docker-image-uri.txt

      - name: Upload the image uri file as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-uri
          path: docker-image-uri.txt

  # Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Download the artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-uri
          path: artifacts

      - name: Define the image URI
        run: |
          echo "DOCKER_IMAGE_URI=$(cat artifacts/docker-image-uri.txt)" >> $GITHUB_ENV

      - name: Fill in the new image URI in the amazon ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: x-clone
          image: ${{ env.DOCKER_IMAGE_URI }}

      # 新コードをデプロイする前にDBスキーマを最新化する。
      # 先に流さないと、新コードがまだ存在しないテーブルやカラムを参照して起動時に壊れるため、Deployの前に置く。
      # AWS公式にmigrate（単発タスク）用のアクションが無いため、runでaws CLIを直接叩く方を採択。
      - name: Run migrations
        env:
          RENDERED_ECS_TASK_DEFINITION: ${{ steps.render-task-definition.outputs.task-definition }}
        run: |
          # run-taskは登録済みのタスク定義(ARN)しか受け取れない。renderの出力は未登録の
          # JSONファイルなので、ここで登録してARNに変換する。
          REGISTERED_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://$RENDERED_ECS_TASK_DEFINITION" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].networkConfiguration' --output json)

          MIGRATE_TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition "$REGISTERED_TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides '{
              "containerOverrides": [{
                "name": "x-clone",
                "command": ["./migrate"]
              }]
            }' \
            --query 'tasks[0].taskArn' --output text)

          echo "migrate task started: $MIGRATE_TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$MIGRATE_TASK_ARN"

          # タスクは成功でも失敗でも停止するため、停止しただけでは成否が分からない。
          # exit codeを見て、0以外なら失敗させてDeployに進ませない。
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "$MIGRATE_TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          echo "migrate exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "マイグレーションに失敗しました"
            exit 1
          fi

      - name: Deploy ECS task
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
