<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>メッセージ一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/dm.js" defer></script>
  </head>
  <body class="bg-white text-gray-900">
    <div
      class="max-w-[600px] mx-auto border-x border-gray-100 min-h-screen flex flex-col"
    >
      <header
        class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-gray-100 p-4 flex items-center gap-4 z-10"
      >
        <a
          href="/dm/groups"
          class="p-2 hover:bg-gray-100 rounded-full transition"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18"
            />
          </svg>
        </a>
        <h2 class="text-xl font-bold">メッセージ</h2>
      </header>

      <div id="messageList" class="flex flex-col flex-1 p-4 space-y-4"></div>
    </div>
  </body>
</html>
