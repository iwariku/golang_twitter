<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投稿一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-white text-gray-900">
    <div class="max-w-[600px] mx-auto border-x border-gray-100 min-h-screen">
      <header
        class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-gray-100"
      >
        <div class="flex h-[53px] items-center text-center font-bold">
          <div
            class="flex-1 hover:bg-gray-200/50 h-full flex items-center justify-center cursor-pointer relative group"
          >
            <span class="relative h-full flex items-center text-[15px]">
              おすすめ
            </span>
          </div>
          <div
            class="flex-1 hover:bg-gray-200/50 h-full flex items-center justify-center cursor-pointer text-gray-500 text-[15px]"
          >
            フォロー中
          </div>
        </div>
      </header>

      <div id="tweet-list" class="flex flex-col">
        <div
          class="p-4 border-b border-gray-100 hover:bg-gray-50/50 transition cursor-pointer"
        >
          <div class="flex gap-3">
            <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
            <div class="flex-1">
              <div class="flex items-center gap-1">
                <span class="font-bold text-[15px] hover:underline"
                  >User ID: 1</span
                >
              </div>
              <p class="text-[15px] leading-5 mt-1">
                ここにツイートの内容が表示されます。各投稿の下に border-b
                をつけました。
              </p>
            </div>
          </div>
        </div>
      </div>

      <footer class="flex flex-col items-center p-8 gap-4">
        <div class="flex items-center gap-6">
          <button
            id="prev-btn"
            class="px-5 py-2 rounded-full font-bold text-sm hover: bg-gray-300 disabled:opacity-30 transition"
          >
            前の10件
          </button>
          <span id="page-info" class="text-sm font-medium text-gray-500"
            >1 / 10 ページ</span
          >
          <button
            id="next-btn"
            class="px-5 py-2 rounded-full font-bold text-sm hover: bg-gray-300 disabled:opacity-30 transition"
          >
            次の10件
          </button>
        </div>
      </footer>
    </div>
  </body>
</html>
