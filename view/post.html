<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>投稿</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-200 flex items-center justify-center min-h-screen">
    <div
      class="bg-white w-full max-w-[600px] rounded-2xl shadow-xl overflow-hidden relative"
    >
      <div class="p-3">
        <a
          href="/"
          class="inline-block p-2 rounded-full hover:bg-gray-100 transition-colors"
        >
          ×
        </a>
      </div>

      <div class="flex px-4 pb-4">
        <div class="flex-shrink-0 mr-3">
          <div class="w-10 h-10 bg-gray-300 rounded-full overflow-hidden">
            <img src="../static/x-logo/acount-log.png" alt="avatar" />
          </div>
        </div>

        <form id="tweet-form" class="flex-1">
          <textarea
            name="tweet-content"
            id="tweet-content"
            maxlength="140"
            rows="4"
            required
            placeholder="いまどうしてる？"
            class="w-full text-xl border-none outline-none resize-none py-2"
          ></textarea>

          <div
            class="flex items-center justify-between pt-3 border-t border-gray-100 mt-2"
          >
            <div class="flex space-x-2 text-sky-500"></div>
            <button
              type="submit"
              class="bg-gray-500 text-white font-bold py-2 px-5 rounded-full hover:bg-black transition-colors disabled:opacity-50 disabled:cursor-not-allowed mb-1 mr-1"
            >
              ポストする
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      document.getElementById('tweet-form').addEventListener('submit', (e) => {
        e.preventDefault();

        const textValue = document.getElementById('tweet-content').value;

        fetch('/post', {
          method: 'post',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: textValue }),
        });
      });
    </script>
  </body>
</html>
